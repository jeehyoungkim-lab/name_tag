<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학회 이름표 생성기 (3인용)</title>

    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
        .no-print { padding: 20px; background: #fff; border-bottom: 2px solid #ccc; text-align: center; }
        input { padding: 10px; font-size: 16px; width: 180px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }

        @page { size: A4; margin: 0; }
        .page {
            width: 210mm; height: 297mm;
            background: white; margin: 20px auto;
            display: grid;
            grid-template-rows: repeat(3, 99mm);
            box-sizing: border-box;
        }

        .row {
            display: grid;
            grid-template-columns: 105mm 105mm;
            border-bottom: 1px dashed #bbb;
            box-sizing: border-box;
        }

        .nametag-part {
            border-right: 1px dotted #ccc;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 10mm;
            text-align: center;
        }
        .org-text { font-size: 18pt; color: #555; margin-bottom: 5mm; }
        .name-text { font-size: 35pt; font-weight: bold; margin-bottom: 8mm; }
        .qr-center { margin: 0 auto; }

        .receipt-part {
            display: flex; flex-direction: column;
            padding: 15mm 10mm;
            position: relative;
        }
        .receipt-title { font-size: 16pt; font-weight: bold; text-align: center; border: 2px solid #000; padding: 5px; margin-bottom: 10mm; }
        .receipt-details { font-size: 11pt; line-height: 2.2; }
        .receipt-footer { margin-top: auto; text-align: center; font-weight: bold; font-size: 12pt; }

        @media print {
            .no-print { display: none; }
            .page { margin: 0; border: none; }
            .row:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2>학회 이름표/영수증 생성 (A4 3행)</h2>

    <!-- 3명 입력칸 -->
    <div>
        <input id="name1" value="홍길동">
        <input id="org1" value="조선 의학연구소"><br>

        <input id="name2" value="손오공">
        <input id="org2" value="화과산 연구원"><br>

        <input id="name3" value="이몽룡">
        <input id="org3" value="남원 학회"><br>
    </div>

    <button onclick="generate()">미리보기 생성</button>
    <button onclick="window.print()" style="background:#28a745;">인쇄하기</button>
    <button onclick="location.reload()" style="background:#dc3545;">초기화</button>
</div>

<div class="page" id="mainPage"></div>

<script>
function generate() {
    const page = document.getElementById('mainPage');
    page.innerHTML = ""; // 초기화 후 다시 생성

    for (let i = 1; i <= 3; i++) {
        const name = document.getElementById('name' + i).value.trim();
        const org = document.getElementById('org' + i).value.trim();

        const row = document.createElement('div');
        row.className = 'row';

        const qrId = "qr_" + i;
        const qrContent = `${name};${org}`;

        row.innerHTML = `
            <div class="nametag-part">
                <div class="org-text">${org}</div>
                <div class="name-text">${name} 님</div>
                <div id="${qrId}" class="qr-center"></div>
            </div>
            <div class="receipt-part">
                <div class="receipt-title">등 록 비 영 수 증</div>
                <div class="receipt-details">
                    • 성 명 : ${name}<br>
                    • 소 속 : ${org}<br>
                    • 금 액 : ￦ 100,000<br>
                    • 내 역 : 학술대회 등록비 및 자료집
                </div>
                <div class="receipt-footer">위 금액을 정히 영수함</div>
            </div>
        `;

        page.appendChild(row);

        new QRCode(document.getElementById(qrId), {
            text: qrContent,
            width: 90,
            height: 90,
            correctLevel: QRCode.CorrectLevel.H
        });
    }
}
</script>

</body>
</html>
